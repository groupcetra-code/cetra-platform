name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Update Browserslist DB
        run: npx browserslist@latest --update-db || true
      - name: Build
        run: |
          npm run build
        continue-on-error: true
      - name: Run ESLint
        run: |
          npx eslint . --ext .ts,.tsx,.js,.jsx || true
      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            ./npm-debug.log
            ./install-output.txt
            ./build-output.txt
            ./eslint-output.txt
